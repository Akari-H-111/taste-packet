name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm run setup
        
      - name: Run E2E Integration Tests
        run: npm test

      - name: Run deterministic benchmark
        run: npm run benchmark

      - name: Verify package artifact
        run: |
          npm pack ./xtaste-client-sdk --pack-destination /tmp
          npm install --prefix /tmp/taste-smoke /tmp/xtaste-client-sdk-*.tgz
          cd /tmp/taste-smoke
          node --input-type=module -e "import('xtaste-client-sdk').then(({ PACKET_BYTES }) => { if (PACKET_BYTES !== 16) throw new Error('package smoke failed'); })"
