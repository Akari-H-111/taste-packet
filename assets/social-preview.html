<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project .taste Social Preview</title>
    <style>
        * { box-sizing: border-box; }

        html,
        body {
            width: 1280px;
            height: 640px;
            margin: 0;
            overflow: hidden;
        }

        body {
            display: grid;
            grid-template-columns: 56% 44%;
            background: #0e1113;
            color: #f4f7f8;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        main {
            position: relative;
            padding: 58px 68px 52px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30373c;
        }

        .accent {
            width: 144px;
            height: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 42px;
        }

        .accent i:nth-child(1) { background: #18b9c5; }
        .accent i:nth-child(2) { background: #ff806d; }
        .accent i:nth-child(3) { background: #8fbd59; }
        .accent i:nth-child(4) { background: #e7529b; }

        h1 {
            margin: 0;
            font-size: 64px;
            line-height: 1;
            font-weight: 780;
        }

        .tagline {
            max-width: 560px;
            margin: 28px 0 18px;
            color: #dfe5e8;
            font-size: 34px;
            line-height: 1.18;
            font-weight: 620;
        }

        .description {
            max-width: 530px;
            margin: 0;
            color: #9ba8af;
            font-size: 18px;
            line-height: 1.45;
        }

        .metrics {
            margin-top: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .metric {
            padding-top: 12px;
            border-top: 2px solid #465159;
        }

        .metric:nth-child(1) { border-color: #18b9c5; }
        .metric:nth-child(2) { border-color: #8fbd59; }
        .metric:nth-child(3) { border-color: #ff806d; }
        .metric strong,
        .metric span { display: block; }
        .metric strong { font-size: 19px; }
        .metric span { margin-top: 5px; color: #9ba8af; font-size: 13px; }

        figure {
            position: relative;
            margin: 0;
            overflow: hidden;
            background: #e7ecec;
        }

        figure img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: 49% center;
        }

        figure::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 18px solid rgba(14, 17, 19, 0.12);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <main>
        <div class="accent" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
        <h1>Project .taste</h1>
        <p class="tagline">The shape arrives first.<br>The story follows.</p>
        <p class="description">A deterministic 16-byte semantic preview protocol for progressive social timelines.</p>
        <div class="metrics">
            <div class="metric"><strong>16 bytes</strong><span>per preview</span></div>
            <div class="metric"><strong>0 deps</strong><span>at runtime</span></div>
            <div class="metric"><strong>Protocol v1</strong><span>TypeScript SDK</span></div>
        </div>
    </main>
    <figure>
        <img src="demo-media.jpg" width="1200" height="800" alt="A glass 4 by 4 semantic matrix">
    </figure>
</body>
</html>
