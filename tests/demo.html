<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Project .taste live demo: ten social timeline previews from 160 bytes.">
    <title>Project .taste — 16-Byte Preview Demo</title>
    <style>
        :root {
            color-scheme: dark;
            --page: #0e1113;
            --surface: #15191c;
            --surface-raised: #1b2024;
            --border: #30373c;
            --border-strong: #465159;
            --text: #f4f7f8;
            --muted: #9ba8af;
            --cyan: #18b9c5;
            --coral: #ff806d;
            --green: #8fbd59;
            --magenta: #e7529b;
            --skeleton: #293036;
        }

        * { box-sizing: border-box; }

        body {
            min-width: 320px;
            margin: 0;
            background: var(--page);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        button { font: inherit; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border);
            background: rgba(14, 17, 19, 0.96);
            backdrop-filter: blur(14px);
        }

        .topbar-inner {
            width: min(1180px, calc(100% - 32px));
            min-height: 70px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.1;
            font-weight: 760;
        }

        .brand p {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phase {
            min-width: 118px;
            color: var(--cyan);
            font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            text-align: right;
            text-transform: uppercase;
        }

        .replay {
            min-height: 36px;
            padding: 0 14px;
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            background: var(--surface-raised);
            color: var(--text);
            cursor: pointer;
        }

        .replay:hover { border-color: var(--cyan); }
        .replay:focus-visible,
        .byte:focus-visible,
        .post:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 2px;
        }

        main {
            width: min(1180px, calc(100% - 32px));
            margin: 28px auto 56px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 36px;
            align-items: start;
        }

        .section-heading {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 14px;
        }

        .section-heading h2,
        .inspector h2 {
            margin: 0;
            font-size: 15px;
            line-height: 1.2;
        }

        .section-heading p {
            margin: 0;
            color: var(--muted);
            font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            text-align: right;
        }

        .timeline {
            max-height: 760px;
            padding-right: 8px;
            overflow-y: auto;
            scrollbar-color: var(--border-strong) transparent;
        }

        .post {
            width: 100%;
            margin: 0 0 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: inherit;
            text-align: left;
            cursor: pointer;
        }

        .post:hover,
        .post[aria-current="true"] { border-color: var(--border-strong); }
        .post[aria-current="true"] { box-shadow: inset 3px 0 0 var(--cyan); }

        .post-stack { display: grid; }
        .post-stack > * { grid-area: 1 / 1; }

        .preview,
        .story {
            display: grid;
            grid-template-rows: 44px auto auto 26px;
            gap: 12px;
            transition: opacity 220ms ease;
        }

        .preview { opacity: 1; }
        .story { opacity: 0; pointer-events: none; }
        .hydrated .preview { opacity: 0; pointer-events: none; }
        .hydrated .story { opacity: 1; }

        .post-header {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            min-height: 44px;
        }

        .avatar,
        .avatar-skeleton {
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .avatar {
            display: grid;
            place-items: center;
            background: var(--avatar-color);
            color: #071012;
            font-size: 13px;
            font-weight: 850;
        }

        .identity {
            min-width: 0;
            display: flex;
            align-items: baseline;
            gap: 7px;
            white-space: nowrap;
            overflow: hidden;
        }

        .identity strong,
        .identity span {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .identity strong { font-size: 14px; }
        .identity span { color: var(--muted); font-size: 13px; }

        .line,
        .avatar-skeleton,
        .action-skeleton {
            background: var(--skeleton);
        }

        .identity-skeleton {
            display: grid;
            gap: 7px;
        }

        .line { height: 12px; border-radius: 3px; }
        .line.short { width: 38%; }
        .line.medium { width: 64%; }

        .text-block {
            min-height: 54px;
            display: grid;
            align-content: start;
            gap: 7px;
        }

        .post-copy {
            min-height: 54px;
            margin: 0;
            color: #dfe5e8;
            font-size: 14px;
            line-height: 1.5;
        }

        .media-frame {
            width: 100%;
            aspect-ratio: 3 / 2;
            min-height: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: linear-gradient(135deg, var(--color-a), var(--color-b), var(--color-c), var(--color-d));
            background-size: 180% 180%;
            animation: drift 5s ease-in-out infinite;
        }

        .media-frame img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .no-media {
            aspect-ratio: auto;
            height: 0;
            border: 0;
        }

        .actions {
            min-height: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            font-size: 12px;
        }

        .action-skeleton {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .liked { color: var(--magenta); font-weight: 750; }

        @keyframes drift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .inspector {
            position: sticky;
            top: 98px;
        }

        .inspector-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
        }

        .packet-number {
            color: var(--muted);
            font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .byte-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
        }

        .byte {
            aspect-ratio: 1;
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font: 700 14px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .byte:hover,
        .byte[aria-pressed="true"] {
            border-color: var(--cyan);
            background: #153034;
        }

        .byte:nth-child(-n+4) { color: #7ed8df; }
        .byte:nth-child(n+5):nth-child(-n+8) { color: #ff9c8c; }
        .byte:nth-child(n+9):nth-child(-n+12) { color: #acd57f; }
        .byte:nth-child(n+13) { color: #f083ba; }

        .field-detail {
            min-height: 94px;
            margin: 14px 0 20px;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .field-detail strong {
            display: block;
            margin-bottom: 6px;
            font: 700 13px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .field-detail p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .metric {
            min-width: 0;
            padding: 10px 0;
            border-top: 2px solid var(--border-strong);
        }

        .metric:nth-child(1) { border-color: var(--cyan); }
        .metric:nth-child(2) { border-color: var(--green); }
        .metric:nth-child(3) { border-color: var(--coral); }

        .metric strong,
        .metric span { display: block; }
        .metric strong { font-size: 15px; }
        .metric span {
            margin-top: 4px;
            color: var(--muted);
            font-size: 11px;
        }

        .hex-line {
            margin: 18px 0 0;
            overflow-wrap: anywhere;
            color: var(--muted);
            font: 11px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .footer {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto 40px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px;
        }

        .footer a { color: var(--text); }

        @media (max-width: 840px) {
            .topbar-inner { min-height: 78px; }
            .brand p { display: none; }
            main { grid-template-columns: 1fr; gap: 28px; }
            .timeline { max-height: none; padding-right: 0; overflow: visible; }
            .inspector { position: static; }
        }

        @media (max-width: 520px) {
            .topbar-inner,
            main,
            .footer { width: min(100% - 20px, 1180px); }
            .topbar-inner { gap: 10px; }
            .brand h1 { font-size: 18px; }
            .phase { min-width: 88px; font-size: 10px; }
            .replay { padding: 0 10px; }
            main { margin-top: 18px; }
            .section-heading { align-items: start; flex-direction: column; gap: 5px; }
            .section-heading p { text-align: left; }
            .post { padding: 13px; }
            .byte { font-size: 13px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <h1>Project .taste</h1>
                <p>The shape arrives first. The story follows.</p>
            </div>
            <div class="top-actions">
                <div id="phase" class="phase" aria-live="polite">Preview packets</div>
                <button id="replay" class="replay" type="button">Replay</button>
            </div>
        </div>
    </header>

    <main>
        <section aria-labelledby="timeline-heading">
            <div class="section-heading">
                <h2 id="timeline-heading">Timeline</h2>
                <p id="timeline-status">10 previews / 160 bytes</p>
            </div>
            <div id="timeline" class="timeline" aria-live="polite"></div>
        </section>

        <aside class="inspector" aria-labelledby="inspector-heading">
            <div class="inspector-head">
                <h2 id="inspector-heading">Packet inspector</h2>
                <span id="packet-number" class="packet-number">Packet 01</span>
            </div>
            <div id="byte-grid" class="byte-grid" aria-label="16 packet bytes"></div>
            <div id="field-detail" class="field-detail" aria-live="polite"></div>
            <div class="metrics">
                <div class="metric"><strong>16 B</strong><span>fixed packet</span></div>
                <div class="metric"><strong>v1</strong><span>protocol</span></div>
                <div class="metric"><strong id="cls-value">0.000</strong><span>observed CLS</span></div>
            </div>
            <p id="hex-line" class="hex-line"></p>
        </aside>
    </main>

    <footer class="footer">
        <a href="https://github.com/Akari-H-111/taste-packet">Source and protocol</a>
        · zero runtime dependencies · full content remains on the host API
    </footer>

    <script type="module">
        import {
            Field,
            TasteDecoder,
            TasteEncoder,
        } from '../xtaste-client-sdk/dist/index.js';

        const PALETTE = [
            '#7ed8df', '#ff9c8c', '#acd57f', '#f083ba',
            '#6ca9d7', '#d8c66b', '#78c6a3', '#b3a1e2',
            '#3e7d82', '#9d5148', '#5f7e3f', '#8f466f',
            '#35566e', '#7e6e31', '#3d6f5b', '#5b5376',
        ];

        const FIELD_DETAILS = [
            ['VertexColorA', 'Palette seed, hash bits 0-7.'],
            ['VertexColorB', 'Palette seed, hash bits 8-15.'],
            ['VertexColorC', 'Palette seed, hash bits 16-23.'],
            ['VertexColorD', 'Palette seed, hash bits 24-31.'],
            ['EmotionBase', 'Emotional tone mapped onto 0-255.'],
            ['AnimVelocity', 'Animation speed bucket from engagement.'],
            ['GrainTexture', 'Texture hint; video uses zero.'],
            ['LightField', 'Shared lighting direction hint.'],
            ['UILayoutSpec', 'Text-only, top-image, side-image, or grid.'],
            ['ElemDensity', 'Number of media elements, 0-15.'],
            ['MediaType', 'None, image, video, audio, or poll.'],
            ['TextLength', 'Log-scaled text geometry hint.'],
            ['HotBucket', 'Logarithmic engagement heat.'],
            ['Interaction', 'Eight social-state flags in one byte.'],
            ['Reserved14', 'Reserved for a future compatible field.'],
            ['ProtocolVersion', 'Packet schema version; v1 is supported.'],
        ];

        const baseSocialState = {
            liked: false,
            reposted: false,
            commented: false,
            bookmarked: false,
            closeFriend: false,
            following: true,
            muted: false,
            blocked: false,
        };

        const names = ['Mina', 'Jon Bell', 'Rae', 'Noah', 'Iris', 'Sam', 'Avery', 'Nico', 'June', 'Kai'];
        const handles = ['@mina', '@jonb', '@rae', '@noah', '@iris', '@sam', '@avery', '@nico', '@june', '@kai'];
        const copy = [
            'Sixteen glass cells, one stable preview. The full image arrived without moving the frame.',
            'A compact contract lets the client reserve the right geometry before the API finishes.',
            'The preview packet is not the story. It simply gives the story a place to land.',
            'Fixed-size data makes the first render deterministic and easy to test.',
            'Existing REST and GraphQL paths keep carrying the full content independently.',
            'A protocol earns trust when its limits are as explicit as its benchmark.',
            'One interaction byte carries eight viewer-specific boolean states.',
            'Protocol version lives in the packet, so incompatible clients can fall back safely.',
            'The SDK stays synchronous and has no runtime dependencies.',
            'Ten previews need 160 bytes before their full content arrives.',
        ];

        const posts = Array.from({ length: 10 }, (_, index) => ({
            postId: `demo-${index + 1}`,
            text: copy[index],
            mediaCount: index === 0 ? 1 : 0,
            mediaType: index === 0 ? 1 : 0,
            engagement: index * 1200,
            emotionScore: (index + 2) / 12,
            socialState: {
                ...baseSocialState,
                liked: index % 2 === 0,
                reposted: index % 3 === 0,
                bookmarked: index % 4 === 0,
                closeFriend: index === 0,
            },
            layout: index === 0 ? 1 : 0,
        }));

        const packets = posts.map((post) => TasteEncoder.encode(post));
        const previews = packets.map((packet) => TasteDecoder.decode(packet.buf));
        const timeline = document.getElementById('timeline');
        const phase = document.getElementById('phase');
        const clsValue = document.getElementById('cls-value');
        let selectedPacket = 0;
        let hydrationTimer;
        let cumulativeLayoutShift = 0;

        if ('PerformanceObserver' in window) {
            try {
                const observer = new PerformanceObserver((list) => {
                    for (const entry of list.getEntries()) {
                        if (!entry.hadRecentInput) cumulativeLayoutShift += entry.value;
                    }
                    clsValue.textContent = cumulativeLayoutShift.toFixed(3);
                });
                observer.observe({ type: 'layout-shift', buffered: true });
            } catch {
                clsValue.textContent = 'n/a';
            }
        } else {
            clsValue.textContent = 'n/a';
        }

        function paletteFor(preview) {
            return preview.visual.vertexColors.map((value) => PALETTE[value % PALETTE.length]);
        }

        function postMarkup(post, preview, index) {
            const colors = paletteFor(preview);
            const hasMedia = preview.layout.mediaType !== 0;
            const image = index === 0
                ? '<img src="../assets/demo-media.jpg" width="1200" height="800" alt="A glass 4 by 4 matrix on a daylight workspace">'
                : '';
            const initials = names[index].split(' ').map((part) => part[0]).join('');

            return `
                <div class="post-stack" style="--color-a:${colors[0]};--color-b:${colors[1]};--color-c:${colors[2]};--color-d:${colors[3]};--avatar-color:${colors[0]}">
                    <div class="preview" aria-hidden="true">
                        <div class="post-header">
                            <div class="avatar-skeleton"></div>
                            <div class="identity-skeleton"><div class="line medium"></div><div class="line short"></div></div>
                        </div>
                        <div class="text-block"><div class="line"></div><div class="line"></div><div class="line medium"></div></div>
                        <div class="media-frame ${hasMedia ? '' : 'no-media'}"></div>
                        <div class="actions"><i class="action-skeleton"></i><i class="action-skeleton"></i><i class="action-skeleton"></i><i class="action-skeleton"></i></div>
                    </div>
                    <div class="story">
                        <div class="post-header">
                            <div class="avatar">${initials}</div>
                            <div class="identity"><strong>${names[index]}</strong><span>${handles[index]} · ${index + 1}m</span></div>
                        </div>
                        <p class="post-copy">${post.text}</p>
                        <div class="media-frame ${hasMedia ? '' : 'no-media'}">${image}</div>
                        <div class="actions"><span>Reply</span><span>Repost ${index * 3}</span><span class="${post.socialState.liked ? 'liked' : ''}">Like ${index * 11 + 1}</span><span>Save</span></div>
                    </div>
                </div>
            `;
        }

        function renderTimeline() {
            timeline.innerHTML = '';
            posts.forEach((post, index) => {
                const card = document.createElement('article');
                card.className = 'post';
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.dataset.index = String(index);
                card.setAttribute('aria-label', `Inspect preview packet ${index + 1}`);
                card.setAttribute('aria-current', index === selectedPacket ? 'true' : 'false');
                card.innerHTML = postMarkup(post, previews[index], index);
                card.addEventListener('click', () => selectPacket(index));
                card.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        selectPacket(index);
                    }
                });
                timeline.appendChild(card);
            });
        }

        function renderInspector(packetIndex, fieldIndex = 0) {
            const bytes = packets[packetIndex].buf;
            document.getElementById('packet-number').textContent = `Packet ${String(packetIndex + 1).padStart(2, '0')}`;
            document.getElementById('hex-line').textContent = Array.from(bytes, (byte) => byte.toString(16).padStart(2, '0')).join(' ');

            const grid = document.getElementById('byte-grid');
            grid.innerHTML = '';
            bytes.forEach((byte, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'byte';
                button.textContent = byte.toString(16).padStart(2, '0');
                button.setAttribute('aria-label', `Byte ${index}: ${FIELD_DETAILS[index][0]}, value ${byte}`);
                button.setAttribute('aria-pressed', index === fieldIndex ? 'true' : 'false');
                button.addEventListener('click', () => renderInspector(packetIndex, index));
                grid.appendChild(button);
            });

            const [name, description] = FIELD_DETAILS[fieldIndex];
            document.getElementById('field-detail').innerHTML = `
                <strong>Byte ${fieldIndex} · ${name} · ${bytes[fieldIndex]}</strong>
                <p>${description}</p>
            `;
        }

        function selectPacket(index) {
            selectedPacket = index;
            document.querySelectorAll('.post').forEach((card, cardIndex) => {
                card.setAttribute('aria-current', cardIndex === index ? 'true' : 'false');
            });
            renderInspector(index);
        }

        function replay() {
            clearTimeout(hydrationTimer);
            document.querySelectorAll('.post').forEach((card) => card.classList.remove('hydrated'));
            phase.textContent = 'Preview packets';
            hydrationTimer = setTimeout(() => {
                document.querySelectorAll('.post').forEach((card) => card.classList.add('hydrated'));
                phase.textContent = 'Full content';
                requestAnimationFrame(() => {
                    clsValue.textContent = cumulativeLayoutShift.toFixed(3);
                });
            }, 1400);
        }

        document.getElementById('replay').addEventListener('click', replay);
        renderTimeline();
        renderInspector(0, Field.VertexColorA);
        replay();
    </script>
</body>
</html>
