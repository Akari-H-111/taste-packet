<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Taste Visual Hydration Demo</title>
    <style>
        :root {
            --bg-color: #0f1419;
            --text-color: #e7e9ea;
            --border-color: #2f3336;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #timeline {
            width: 100%;
            max-width: 600px;
        }
        .tweet-skeleton {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .header-skel { display: flex; gap: 12px; align-items: center; }
        .avatar-skel { width: 48px; height: 48px; border-radius: 50%; background: #2f3336; }
        .name-skel { width: 120px; height: 16px; border-radius: 4px; background: #2f3336; }
        
        .text-skel { height: 16px; border-radius: 4px; background: #2f3336; }
        
        /* The magic: CSS Gradient from Row 0 Vertex Colors */
        .media-skel {
            width: 100%;
            border-radius: 12px;
            /* Placeholder height; will be adjusted by JS based on LayoutSpec */
            height: 250px; 
            background: linear-gradient(135deg, var(--color-a), var(--color-b), var(--color-c), var(--color-d));
            background-size: 200% 200%;
            animation: flow 4s ease infinite;
        }
        
        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .actions-skel {
            display: flex;
            justify-content: space-between;
            padding-top: 8px;
        }
        .action-icon {
            width: 20px; height: 20px; border-radius: 50%; background: #2f3336;
        }
        .action-liked { background: #f91880; } /* Pink color for liked */

        #stats {
            background: #1d9bf0;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: bold;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Project .taste</h1>
        <p>The shape arrives first. The story follows.</p>
        <div id="stats" aria-live="polite">X-Taste Hydrating...</div>
        <div id="timeline"></div>
    </main>

    <!-- Load the checked-in SDK build so this demo needs no bundler. -->
    <script type="module">
        import { TasteDecoder, TasteEncoder } from '../xtaste-client-sdk/dist/index.js';

        // A tiny 16-color shared palette simulating what the client has cached
        const PALETTE = [
            '#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#D3B8FF', '#FFB8E0', '#FFD1D1',
            '#1DA1F2', '#14171A', '#657786', '#AAB8C2', '#E1E8ED', '#F5F8FA', '#FFFFFF', '#000000'
        ];

        const posts = Array.from({ length: 10 }, (_, index) => ({
            postId: `demo-${index + 1}`,
            text: `A compact preview keeps post ${index + 1} stable while full content loads.`,
            mediaCount: index % 3 === 0 ? 1 : 0,
            mediaType: index % 3 === 0 ? 1 : 0,
            engagement: index * 1200,
            emotionScore: (index + 2) / 12,
            socialState: {
                liked: index % 2 === 0,
                reposted: index % 3 === 0,
                commented: false,
                bookmarked: index % 4 === 0,
                closeFriend: index === 0,
                following: true,
                muted: false,
                blocked: false
            },
            layout: index % 3 === 0 ? 1 : 0
        }));

        const packets = posts.map((post) => TasteEncoder.encode(post));
        const timeline = document.getElementById('timeline');
        
        const startTime = performance.now();

        packets.forEach(matrix => {
            const preview = TasteDecoder.decode(matrix.buf);
            const [colorA, colorB, colorC, colorD] = preview.visual.vertexColors.map(
                (index) => PALETTE[index % PALETTE.length]
            );
            const isLiked = preview.state.social.liked;
            const textLines = Math.max(1, Math.ceil(preview.layout.textLength / 80));
            const mediaHeight = preview.layout.mediaType === 0 ? '0px' : '250px';

            // Build DOM
            const el = document.createElement('div');
            el.className = 'tweet-skeleton';
            
            // Map colors to CSS variables for GPU interpolation
            el.style.setProperty('--color-a', colorA);
            el.style.setProperty('--color-b', colorB);
            el.style.setProperty('--color-c', colorC);
            el.style.setProperty('--color-d', colorD);

            let html = `
                <div class="header-skel">
                    <div class="avatar-skel"></div>
                    <div class="name-skel"></div>
                </div>
            `;
            
            for(let i=0; i<textLines; i++) {
                html += `<div class="text-skel" style="width: ${i===textLines-1 ? '60%' : '100%'}"></div>`;
            }

            if(mediaHeight !== '0px') {
                html += `<div class="media-skel" style="height: ${mediaHeight}"></div>`;
            }

            html += `
                <div class="actions-skel">
                    <div class="action-icon"></div>
                    <div class="action-icon"></div>
                    <div class="action-icon ${isLiked ? 'action-liked' : ''}"></div>
                    <div class="action-icon"></div>
                </div>
            `;

            el.innerHTML = html;
            el.setAttribute('aria-label', `16-byte preview, ${matrix.buf.byteLength} bytes`);
            timeline.appendChild(el);
        });

        const endTime = performance.now();
        document.getElementById('stats').innerText = `10 previews hydrated from 160 bytes in ${(endTime - startTime).toFixed(2)} ms`;
    </script>
</body>
</html>
